                "text": "電子契約が印紙税の対象外である法的根拠と境界ケースを整理します(画面トップでも基本ルールを案内しています)。\n\n【法的根拠(4点)】\n1. 印紙税法第2条・第3条 — 「文書」の作成に課税。電磁的記録は「文書」に該当しない\n2. 平成17年3月15日 参議院答弁書第9号(小泉内閣) — 政府見解として明示\n3. 平成20年10月24日 福岡国税局文書回答「注文請書を電子メール送信する場合」 — 実務基準として確立\n4. 国税庁 質疑応答事例No.02/10「電磁的記録に対する印紙税」 — 国税庁本庁レベルで再確認\n\n【境界ケース：紙と電子の混在】\n・PDF をメール送信のみ → 非課税\n・電子契約後に紙の原本を別途相手方に郵送 → 紙の作成時点で課税(2008年福岡局の但書)\n・電子契約後に社内保管用に紙印刷(相手方への交付なし) → 非課税(「写し」扱い)\n・FAX 送信のみ → 送信側は非課税(電磁的記録の送信に該当)\n・クラウドサイン・GMOサイン等の電子契約サービス → 全て非課税\n\n電子帳簿保存法とは別枠で、印紙税は電子なら全面非課税です。"
              }
            },
            {
              "@type": "Question",
              "name": "消費税と印紙税の関係は？税込・税抜どちらで判定？",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "契約書に消費税額が区分記載されている場合、消費税額を除いた金額(税抜金額)が印紙税の記載金額となります。区分記載がない場合は税込金額で判定\n(国税庁「消費税法の施行に伴う印紙税の取扱いについて」平成元年3月10日付 間消3-2、平成6年4月1日付 課消3-2に改正)。\n\n区分記載の例(いずれも税抜金額で判定可能)：\n・「本体価格1,000万円、消費税100万円」\n・「合計1,100万円(うち消費税100万円)」\n・「1,100万円(税込)、消費税100万円」\n\n単に「1,100万円」とだけ記載 → 税込判定(1,100万円ベース)\n\n本ツールでは消費税の記載方法を質問して自動判定します。"
              }
            },
            {
              "@type": "Question",
              "name": "印紙税の還付とは？どう手続きする？",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "印紙を誤って貼付した場合や、課税文書でない文書に印紙を貼付した場合、「印紙税過誤納確認申請書」を所轄の税務署に提出すると還付を受けられます\n(印紙税法第14条)。\n\n還付の対象：\n・非課税文書に誤って印紙を貼付\n・正規の税額を超える印紙を貼付\n・書損じ等により使用しなかった印紙を貼付した文書\n\n還付されないもの：\n・既に使用済みの収入印紙のみ(文書に貼付していないもの)\n・収入証紙(地方税・行政手数料用の証紙で印紙税還付の対象外。収入印紙との違いは別Q「収入印紙の種類・額面」を参照)\n\n申請書は国税庁公式サイトで入手可能です。"
              }
            },
            {
              "@type": "Question",
              "name": "印紙を貼らないとどうなる？（過怠税）",

                "@type": "Answer",
                "text": "課税文書に印紙を貼らなかった場合、本来の印紙税額の3倍の過怠税が課されます\n(印紙税法第20条第1項)。\n\n例：印紙税2万円の契約書に印紙を貼らなかった → 過怠税6万円(本税2万円＋追加4万円)\n\n軽減されるケース：\n・税務調査前に自主的に不納付を申し出た場合：過怠税は1.1倍(本税＋0.1倍)(同条第2項)\n・印紙を貼ったが消印を忘れた場合：印紙の額面相当額の過怠税(同条第3項)\n\n【最低額ルール】\n過怠税の合計額が1,000円に満たない場合は 1,000円 となります(同条第4項)。本税が100円の文書でも、未貼付なら3倍計算で300円ではなく1,000円徴収される点に注意。\n\n過怠税は損金不算入のため、節税ロスが大きいです。電子契約化で回避するのが最も確実。"
              }
            },
            {
              "@type": "Question",
              "name": "印紙税の第1号〜第20号はどう違う？",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "印紙税法別表第一に課税文書が20種類列挙されており、それぞれ税額の計算方法が異なります。\n\n主な区分：\n・第1号(1-1〜1-4)：不動産譲渡・土地賃借・消費貸借・運送 → 金額別階段税率\n・第2号：請負契約 → 金額別階段税率\n・第3号：約束手形・為替手形 → 金額別階段税率(10万円未満非課税)\n・第4号：株券・社債券 → 金額別階段税率\n・第5号〜第14号：合併・定款・継続取引基本契約・預金証書等 → 定額(200円〜40,000円)\n・第15号：債権譲渡・債務引受 → 1万円以上200円\n・第16号：配当金領収証 → 3,000円以上200円\n・第17号：領収書(第17号の1：売上代金／第17号の2：それ以外)\n・第18号〜第20号：通帳・判取帳 → 年額(200円〜4,000円)"
              }

              "@type": "Question",
              "name": "複数の号に該当する契約書はどうなる？（通則）",

                "@type": "Answer",
                "text": "1つの文書が複数の号に該当する場合、印紙税法別表第一の通則により所属が決まります\n(通則3)。\n\n主なルール：\n・第1号/第2号と第3号〜第17号に該当 → 原則第1号/第2号に所属\n・第1号と第2号に該当 → 原則第1号(ただし金額区分可能で第2号金額が大きい場合は第2号)\n・第17号の売上代金が100万円超で第1号/第2号より高い場合 → 第17号\n\n例：売買契約(第1号)兼請負契約(第2号)→ 通常は第1号\n\n本ツールでは契約内容を入力すると適切な号を自動判定します。"
              }

            {
              "@type": "Question",
              "name": "印紙税の時効は？",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "印紙税の徴収権は法定納期限から5年で時効により消滅します\n(国税通則法第72条)。\n\nただし、税務調査で指摘される可能性は調査対象期間(通常3〜7年)が過ぎるまで残ります。\n\n時効を待たずに自主的に申告すれば過怠税が1.1倍に軽減されるため、気づいた時点で対応する方が有利です。"
